<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shehr Scenes — Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-cream">

  <header class="navbar">
    <div class="nav-inner container">
      <div class="brand">
        <div class="logo-flag" aria-hidden="true"></div>
        <span class="brand-text">SHEHR<br/>SCENES</span>
      </div>
      <nav class="nav-links">
        <a href="home.html">home</a>
        <a href="cities.html">cities</a>
        <a href="events.html">events</a>
        <a href="communities.html">communities</a>
        <a href="profile.html">Profile</a>
        <a href="explore.html" class="cta">login/signup</a>
      </nav>
    </div>
  </header>

  <main class="container pages">
    <div style="max-width: 500px; margin: 40px auto;">
      <div class="login-embed">
        <h2 class="login-title" style="font-size: 28px; margin-bottom: 20px;">Create Account</h2>
        
        <form class="login-form" action="explore.html" method="get">
          <label class="vis-label">
            <input type="text" name="fullname" placeholder="full name" required>
          </label>
          <label class="vis-label">
            <input type="email" name="email" placeholder="email address" required>
          </label>
          <label class="vis-label">
            <input type="text" name="username" placeholder="user name" required>
          </label>
          <label class="vis-label">
            <input type="password" name="password" placeholder="pass word" required>
          </label>

          <button type="submit" class="btn-login large">sign up</button>
        </form>

        <div class="login-links-row">
          <span class="small-link">Already have an account?</span>
          <a class="small-link" href="explore.html" style="color: var(--nav-teal); font-weight: 800;">Login</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">connecting pakistan / discover events / celebrate community</div>
      <div class="footer-right social">
        <img src="images/insta.jpg" alt="ig">
        <img src="images/tictok.jpg" alt="tk">
        <img src="images/whatsapp.jpg" alt="wa">
      </div>
    </div>
  </footer>
</body>
</html>
